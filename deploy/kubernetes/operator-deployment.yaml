---
apiVersion: v1
kind: Namespace
metadata:
  name: forge-autonomy-os
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forge-operator
  namespace: forge-autonomy-os
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: forge-operator
rules:
  - apiGroups: ["forge.ai"]
    resources: ["forgeremedies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["forge.ai"]
    resources: ["forgeremedies/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: forge-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: forge-operator
subjects:
  - kind: ServiceAccount
    name: forge-operator
    namespace: forge-autonomy-os
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-operator
  namespace: forge-autonomy-os
  labels:
    app: forge-operator
    component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forge-operator
  template:
    metadata:
      labels:
        app: forge-operator
        component: operator
    spec:
      serviceAccountName: forge-operator
      containers:
        - name: operator
          image: forge-autonomy-os/operator:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - kopf
            - run
            - /app/app/operator.py
          env:
            - name: FORGE_NAMESPACE
              value: "forge-autonomy-os"
            - name: FORGE_NATS_URL
              value: "nats://forge-nats:4222"
            - name: FORGE_PG_DSN
              valueFrom:
                secretKeyRef:
                  name: forge-db-secret
                  key: dsn
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: forge-webhook-secret
                  key: secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: forge-operator
  namespace: forge-autonomy-os
  labels:
    app: forge-operator
spec:
  selector:
    app: forge-operator
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
