---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: forge-autonomy-os

resources:
  - crd.yaml
  - operator-deployment.yaml
  - backend-deployment.yaml
  - frontend-deployment.yaml
  - nats-deployment.yaml
  - otel-collector.yaml

commonLabels:
  app.kubernetes.io/part-of: forge-autonomy-os
  app.kubernetes.io/managed-by: kustomize

images:
  - name: forge-autonomy-os/backend
    newTag: latest
  - name: forge-autonomy-os/frontend
    newTag: latest
  - name: forge-autonomy-os/operator
    newTag: latest
