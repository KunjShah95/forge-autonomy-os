---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-frontend
  namespace: forge-autonomy-os
  labels:
    app: forge-frontend
    component: ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: forge-frontend
  template:
    metadata:
      labels:
        app: forge-frontend
        component: ui
    spec:
      containers:
        - name: frontend
          image: forge-autonomy-os/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: VITE_API_BASE_URL
              value: "http://forge-backend:8000/api/v1"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: forge-frontend
  namespace: forge-autonomy-os
  labels:
    app: forge-frontend
spec:
  selector:
    app: forge-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
