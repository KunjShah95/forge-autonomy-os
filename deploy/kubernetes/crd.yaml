---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: forgeremedies.forge.ai
spec:
  group: forge.ai
  names:
    kind: ForgeRemedy
    plural: forgeremedies
    singular: forgeremedy
    shortNames:
      - frem
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                service:
                  type: string
                fixType:
                  type: string
                  enum: ["dependency", "config", "flake", "rollback", "restart", "scale"]
                patch:
                  type: string
                version:
                  type: string
                replicas:
                  type: integer
                  minimum: 0
                namespace:
                  type: string
                traceId:
                  type: string
                priority:
                  type: integer
                  minimum: 0
                  maximum: 100
              required:
                - service
                - fixType
            status:
              type: object
              properties:
                status:
                  type: string
                  enum: ["pending", "applied", "failed", "rolled_back"]
                appliedAt:
                  type: string
                  format: date-time
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Service
          type: string
          jsonPath: .spec.service
        - name: Fix
          type: string
          jsonPath: .spec.fixType
        - name: Status
          type: string
          jsonPath: .status.status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
