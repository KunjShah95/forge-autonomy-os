---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-backend
  namespace: forge-autonomy-os
  labels:
    app: forge-backend
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: forge-backend
  template:
    metadata:
      labels:
        app: forge-backend
        component: api
    spec:
      containers:
        - name: backend
          image: forge-autonomy-os/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 9464
              name: metrics
          env:
            - name: FORGE_DB_PATH
              value: "/data/forge.db"
            - name: FORGE_PG_DSN
              valueFrom:
                secretKeyRef:
                  name: forge-db-secret
                  key: dsn
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: forge-webhook-secret
                  key: secret
            - name: FORGE_NATS_URL
              value: "nats://forge-nats:4222"
            - name: FORGE_PERSISTENCE
              value: "postgres"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://forge-otel-collector:4317"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: forge-backend
  namespace: forge-autonomy-os
  labels:
    app: forge-backend
spec:
  selector:
    app: forge-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: metrics
      port: 9464
      targetPort: 9464
  type: ClusterIP
